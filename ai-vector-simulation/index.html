<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Vector Hóa Trong AI</title>
    
    <!-- Tải Tailwind CSS để styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tải thư viện Babel để trình duyệt hiểu được code React JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Tùy chỉnh CSS cho thanh cuộn và hiệu ứng xuất hiện mượt mà */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes slideInFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideInFade 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Nơi React sẽ render ứng dụng -->
    <div id="root"></div>

    <!-- Script chính của ứng dụng -->
    <script type="text/babel" data-type="module">
        // Import React và các Icon từ CDN (esm.sh)
        import React, { useState, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
            Info, Sparkles, Navigation, BrainCircuit, 
            Layers, BookOpen, Lightbulb, Image as ImageIcon, 
            MessageSquare, ShoppingCart, Calculator,
            MousePointerClick, Heart, X, ArrowRight, RotateCcw
        } from 'https://esm.sh/lucide-react@0.292.0';

        const ITEMS = [
            { id: 1, name: "Trà sữa", icon: "🧋", x: 85, y: 75, color: "bg-orange-100" },
            { id: 2, name: "Cà phê đen nóng", icon: "☕", x: 5, y: 10, color: "bg-stone-200" },
            { id: 3, name: "Kem tươi", icon: "🍦", x: 95, y: 95, color: "bg-pink-100" },
            { id: 4, name: "Trà đá", icon: "🧊", x: 10, y: 85, color: "bg-blue-100" },
            { id: 5, name: "Bánh ngọt", icon: "🍰", x: 90, y: 15, color: "bg-yellow-100" },
            { id: 6, name: "Nước lọc", icon: "💧", x: 0, y: 50, color: "bg-cyan-50" },
            { id: 7, name: "Súp nóng", icon: "🥣", x: 15, y: 5, color: "bg-red-100" },
            { id: 8, name: "Sinh tố đá xay", icon: "🥤", x: 70, y: 90, color: "bg-green-100" }
        ];

        // --- CÁC COMPONENT VÍ DỤ TƯƠNG TÁC ---

        const NLPExample = () => {
            const [eqIdx, setEqIdx] = useState(0);
            const equations = [
                { a: "Vua", b: "Đàn Ông", c: "Phụ Nữ", res: "Nữ Hoàng", color: "text-amber-600" },
                { a: "Paris", b: "Pháp", c: "Việt Nam", res: "Hà Nội", color: "text-rose-600" },
                { a: "Mùa Hè", b: "Nóng", c: "Lạnh", res: "Mùa Đông", color: "text-sky-600" }
            ];

            const current = equations[eqIdx];

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6 items-center">
                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center flex-shrink-0">
                        <MessageSquare className="w-8 h-8" />
                    </div>
                    <div className="flex-1 w-full">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">1. AI Ngôn ngữ (ChatGPT làm toán với chữ)</h3>
                        <p className="text-slate-600 mb-4 text-sm">
                        Thay vì hiểu nghĩa, ChatGPT chuyển các từ thành vector tọa độ. Nhờ vậy, nó có thể làm phép cộng trừ ngôn ngữ y như làm toán!
                        </p>
                        <div className="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 flex flex-col items-center">
                        <div className="flex flex-wrap items-center justify-center gap-2 md:gap-4 font-mono font-bold text-lg md:text-xl">
                            <span className="bg-white px-3 py-2 rounded-lg shadow-sm border border-slate-200">{current.a}</span>
                            <span className="text-slate-400">-</span>
                            <span className="bg-white px-3 py-2 rounded-lg shadow-sm border border-slate-200">{current.b}</span>
                            <span className="text-slate-400">+</span>
                            <span className="bg-white px-3 py-2 rounded-lg shadow-sm border border-slate-200">{current.c}</span>
                            <span className="text-slate-400">=</span>
                            <span className={`bg-indigo-50 px-4 py-2 rounded-lg shadow-md border-b-4 border-indigo-200 ${current.color} animate-bounce`}>
                            {current.res}
                            </span>
                        </div>
                        <button 
                            onClick={() => setEqIdx((prev) => (prev + 1) % equations.length)}
                            className="mt-6 flex items-center gap-2 text-sm font-semibold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full hover:bg-indigo-100 transition"
                        >
                            <RotateCcw className="w-4 h-4" /> Thử ví dụ khác
                        </button>
                        </div>
                    </div>
                </div>
            );
        };

        const VisionExample = () => {
            const [pixels, setPixels] = useState([0, 0, 0,  0, 1, 0,  0, 0, 0]);

            const togglePixel = (idx) => {
                const newPixels = [...pixels];
                newPixels[idx] = newPixels[idx] === 0 ? 1 : 0;
                setPixels(newPixels);
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6 items-center">
                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center flex-shrink-0">
                        <ImageIcon className="w-8 h-8" />
                    </div>
                    <div className="flex-1 w-full">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">2. Thị giác Máy tính (FaceID, Xe tự lái)</h3>
                        <p className="text-slate-600 mb-4 text-sm">
                        Máy tính không "nhìn" thấy hình ảnh. Nó trải phẳng lưới điểm ảnh (pixel) thành một mảng các con số trải dài. <strong className="text-emerald-600">Hãy click vào các ô vuông bên dưới để vẽ!</strong>
                        </p>
                        <div className="flex flex-col md:flex-row items-center gap-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div className="relative group">
                            <div className="absolute -top-3 -left-3 bg-emerald-500 text-white text-[10px] px-2 py-1 rounded-full animate-pulse flex items-center gap-1 z-10">
                            <MousePointerClick className="w-3 h-3" /> Click để vẽ
                            </div>
                            <div className="grid grid-cols-3 gap-1 bg-slate-300 p-1 rounded-lg">
                            {pixels.map((val, idx) => (
                                <div 
                                key={idx}
                                onClick={() => togglePixel(idx)}
                                className={`w-12 h-12 rounded-sm cursor-pointer transition-colors duration-200 ${val === 1 ? 'bg-slate-800' : 'bg-white'}`}
                                ></div>
                            ))}
                            </div>
                        </div>
                        <ArrowRight className="hidden md:block w-8 h-8 text-slate-300" />
                        <div className="flex-1 w-full overflow-hidden">
                            <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Vector hình ảnh mà AI nhận được:</p>
                            <div className="bg-slate-800 text-emerald-400 font-mono text-sm md:text-base p-4 rounded-lg break-all">
                            [{pixels.map(p => p === 1 ? '255' : '  0').join(', ')}]
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RecSysExample = () => {
            const [userVector, setUserVector] = useState({ comedy: 50, education: 50 });
            const [itemIdx, setItemIdx] = useState(0);

            const mockVideos = [
                { title: "Mèo trượt ngã hài hước", type: "comedy", icon: "😹" },
                { title: "Học Toán siêu nhanh", type: "education", icon: "📐" },
                { title: "Hài độc thoại cuối tuần", type: "comedy", icon: "🎤" },
                { title: "Lịch sử thế giới 5 phút", type: "education", icon: "🌍" },
            ];

            const handleAction = (isLike) => {
                const currentVideo = mockVideos[itemIdx];
                if (isLike) {
                setUserVector(prev => ({
                    comedy: currentVideo.type === 'comedy' ? Math.min(100, prev.comedy + 15) : Math.max(0, prev.comedy - 5),
                    education: currentVideo.type === 'education' ? Math.min(100, prev.education + 15) : Math.max(0, prev.education - 5),
                }));
                }
                setItemIdx((prev) => (prev + 1) % mockVideos.length);
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6 items-center">
                    <div className="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center flex-shrink-0">
                        <ShoppingCart className="w-8 h-8" />
                    </div>
                    <div className="flex-1 w-full">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">3. Thuật toán Gợi ý (Tiktok, Shopee)</h3>
                        <p className="text-slate-600 mb-4 text-sm">
                        Mỗi khi bạn "Thả tim", thuật toán sẽ cập nhật <strong className="text-orange-600">Vector Sở Thích</strong> của bạn dịch chuyển lại gần loại nội dung đó hơn. Thử tương tác nhé!
                        </p>
                        <div className="grid md:grid-cols-2 gap-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                            <div className="text-5xl mb-2">{mockVideos[itemIdx].icon}</div>
                            <div className="font-bold text-slate-800 mb-4">{mockVideos[itemIdx].title}</div>
                            <div className="flex justify-center gap-4">
                            <button onClick={() => handleAction(false)} className="w-12 h-12 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center transition-colors">
                                <X className="w-6 h-6" />
                            </button>
                            <button onClick={() => handleAction(true)} className="w-12 h-12 rounded-full bg-rose-100 text-rose-500 hover:bg-rose-500 hover:text-white flex items-center justify-center transition-colors shadow-sm">
                                <Heart className="w-6 h-6" />
                            </button>
                            </div>
                            <p className="text-xs text-slate-400 mt-3">Lướt hoặc Thả tim</p>
                        </div>
                        <div className="flex flex-col justify-center space-y-4">
                            <p className="text-sm font-bold text-slate-500 mb-1">Tọa độ Sở thích của bạn:</p>
                            <div>
                            <div className="flex justify-between text-xs font-bold text-amber-600 mb-1">
                                <span>😹 Hài hước</span>
                                <span>{userVector.comedy}%</span>
                            </div>
                            <div className="h-3 w-full bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-amber-500 transition-all duration-300" style={{ width: `${userVector.comedy}%` }}></div>
                            </div>
                            </div>
                            <div>
                            <div className="flex justify-between text-xs font-bold text-blue-600 mb-1">
                                <span>📚 Học thuật</span>
                                <span>{userVector.education}%</span>
                            </div>
                            <div className="h-3 w-full bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${userVector.education}%` }}></div>
                            </div>
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ConceptVectorBuilder = () => {
            const [traits, setTraits] = useState({ color: 90, sweet: 80, size: 50 });
            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <Layers className="w-6 h-6" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-2">1. Vector là gì?</h3>
                    <p className="text-slate-600 text-sm leading-relaxed mb-4 flex-grow">
                        Thay vì đọc chữ "Quả Táo", AI đọc một danh sách các con số. Thử kéo thanh trượt để tạo vector:
                    </p>
                    <div className="space-y-3 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100 text-sm">
                        <div className="flex justify-between items-center gap-2">
                        <span className="w-16">🔴 Độ đỏ</span>
                        <input type="range" min="0" max="100" value={traits.color} onChange={e => setTraits({...traits, color: +e.target.value})} className="flex-1 accent-red-500 h-1" />
                        </div>
                        <div className="flex justify-between items-center gap-2">
                        <span className="w-16">🍬 Độ ngọt</span>
                        <input type="range" min="0" max="100" value={traits.sweet} onChange={e => setTraits({...traits, sweet: +e.target.value})} className="flex-1 accent-pink-500 h-1" />
                        </div>
                        <div className="flex justify-between items-center gap-2">
                        <span className="w-16">📏 Cỡ</span>
                        <input type="range" min="0" max="100" value={traits.size} onChange={e => setTraits({...traits, size: +e.target.value})} className="flex-1 accent-amber-500 h-1" />
                        </div>
                    </div>
                    <div className="bg-blue-50 p-3 rounded-lg text-sm font-mono border border-blue-100 text-center text-slate-700">
                        Vector = <br/>
                        <span className="text-lg font-bold text-blue-700">
                        [{(traits.color / 100).toFixed(1)}, {(traits.sweet / 100).toFixed(1)}, {(traits.size / 100).toFixed(1)}]
                        </span>
                    </div>
                </div>
            );
        };

        const ConceptDimensions = () => {
            const [is2D, setIs2D] = useState(false);
            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                    <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mb-4">
                        <BrainCircuit className="w-6 h-6" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-2">2. "Số chiều" là gì?</h3>
                    <p className="text-slate-600 text-sm leading-relaxed mb-4">
                        Càng nhiều tiêu chí (nhiều chiều), AI phân biệt càng chính xác.
                    </p>
                    <div className="relative flex-grow bg-slate-50 border border-slate-200 rounded-lg p-2 min-h-[140px] flex items-center justify-center overflow-hidden">
                        <div className="absolute text-2xl transition-all duration-700 ease-in-out" style={{ left: '30%', bottom: is2D ? '20%' : '40%' }}>
                        🐶<span className="absolute top-full left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500">Chó</span>
                        </div>
                        <div className="absolute text-2xl transition-all duration-700 ease-in-out" style={{ left: '40%', bottom: is2D ? '80%' : '40%' }}>
                        🐺<span className="absolute top-full left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500">Sói</span>
                        </div>
                        <div className="absolute left-4 right-4 bottom-[40%] h-0.5 bg-slate-300">
                        <span className="absolute -bottom-4 right-0 text-[10px] text-slate-400">Kích thước (X)</span>
                        </div>
                        <div className={`absolute left-[10%] top-4 bottom-4 w-0.5 bg-slate-300 transition-opacity duration-500 ${is2D ? 'opacity-100' : 'opacity-0'}`}>
                        <span className="absolute -top-4 -left-4 text-[10px] text-slate-400 whitespace-nowrap">Hoang dã (Y)</span>
                        </div>
                        <div className="absolute top-2 text-[10px] font-semibold px-2 py-1 bg-white/80 rounded border border-slate-200 text-slate-600 text-center w-3/4">
                        {is2D ? "Tuyệt! Thêm chiều hoang dã, ta thấy rõ sự khác biệt." : "Chỉ đo kích thước, Chó và Sói nằm quá gần nhau!"}
                        </div>
                    </div>
                    <button onClick={() => setIs2D(!is2D)} className="mt-4 w-full py-2 bg-indigo-50 text-indigo-700 rounded-lg text-sm font-bold hover:bg-indigo-100 transition-colors">
                        {is2D ? "Quay về 1 Chiều" : "Thêm Chiều 2 (Hoang dã)"}
                    </button>
                </div>
            );
        };

        const ConceptDistance = () => {
            const [target, setTarget] = useState({x: 8, y: 7});
            const origin = {x: 2, y: 2};
            const dx = target.x - origin.x;
            const dy = target.y - origin.y;
            const dist = Math.sqrt(dx*dx + dy*dy).toFixed(1);

            const handleGridClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = Math.round((e.clientX - rect.left) / rect.width * 10);
                const y = 10 - Math.round((e.clientY - rect.top) / rect.height * 10);
                setTarget({x: Math.max(0, Math.min(10, x)), y: Math.max(0, Math.min(10, y))});
            };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                    <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center mb-4">
                        <Calculator className="w-6 h-6" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-2">3. Tính khoảng cách</h3>
                    <p className="text-slate-600 text-sm leading-relaxed mb-4">
                        Nhấp vào lưới để xem AI tính khoảng cách (độ tương đồng) bằng hình học:
                    </p>
                    <div className="relative flex-grow w-full aspect-square max-h-[160px] bg-slate-50 border-2 border-slate-200 rounded-lg cursor-crosshair overflow-hidden mx-auto" onClick={handleGridClick}>
                        <div className="absolute inset-0 grid grid-cols-10 grid-rows-10 opacity-10 pointer-events-none">
                        {[...Array(100)].map((_, i) => <div key={i} className="border-r border-b border-slate-800"></div>)}
                        </div>
                        <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <line x1={origin.x * 10} y1={100 - origin.y * 10} x2={target.x * 10} y2={100 - origin.y * 10} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,2"/>
                        <line x1={target.x * 10} y1={100 - origin.y * 10} x2={target.x * 10} y2={100 - target.y * 10} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,2"/>
                        <line x1={origin.x * 10} y1={100 - origin.y * 10} x2={target.x * 10} y2={100 - target.y * 10} stroke="#10b981" strokeWidth="2" />
                        </svg>
                        <div className="absolute w-3 h-3 bg-blue-500 rounded-full -ml-[6px] -mb-[6px] border border-white shadow-sm" style={{left: `${origin.x * 10}%`, bottom: `${origin.y * 10}%`}}></div>
                        <div className="absolute w-3 h-3 bg-emerald-500 rounded-full -ml-[6px] -mb-[6px] border border-white shadow-sm transition-all duration-100 pointer-events-none" style={{left: `${target.x * 10}%`, bottom: `${target.y * 10}%`}}></div>
                    </div>
                    <div className="mt-4 bg-emerald-50 p-2 rounded-lg text-xs font-mono text-emerald-800 text-center tracking-tighter">
                        Khoảng cách = √({Math.abs(dx)}² + {Math.abs(dy)}²) = <span className="font-bold text-sm bg-white px-1 rounded">{dist}</span>
                    </div>
                </div>
            );
        };

        // --- COMPONENT CHÍNH ---

        function VectorizationSimulation() {
            const [activeTab, setActiveTab] = useState('simulation');
            const [userX, setUserX] = useState(50);
            const [userY, setUserY] = useState(50);
            const [closestItem, setClosestItem] = useState(null);

            useEffect(() => {
                let minDistance = Infinity;
                let closest = null;
                ITEMS.forEach(item => {
                const distance = Math.sqrt(Math.pow(item.x - userX, 2) + Math.pow(item.y - userY, 2));
                if (distance < minDistance) {
                    minDistance = distance;
                    closest = item;
                }
                });
                setClosestItem(closest);
            }, [userX, userY]);

            const renderSimulation = () => (
                <div className="grid grid-cols-1 md:grid-cols-12 gap-8 animate-in">
                    {/* Cột trái */}
                    <div className="md:col-span-5 space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center">1</span>
                            Tạo Vector Của Bạn
                        </h2>
                        <p className="text-sm text-slate-500 mb-6">
                            Hãy pha chế một món mới bằng cách điều chỉnh 2 thông số. Máy tính sẽ ghi nhận món của bạn dưới dạng một <strong className="text-indigo-600">Vector 2 chiều</strong>.
                        </p>
                        <div className="space-y-6">
                            <div className="space-y-2">
                            <div className="flex justify-between items-center">
                                <label className="font-semibold text-slate-700 flex items-center gap-2">🍬 Độ Ngọt (Trục X)</label>
                                <span className="font-mono font-bold text-indigo-600 w-8 text-right">{userX}</span>
                            </div>
                            <input type="range" min="0" max="100" value={userX} onChange={(e) => setUserX(Number(e.target.value))} className="w-full accent-indigo-600"/>
                            <div className="flex justify-between text-xs text-slate-400"><span>Không đường (0)</span><span>Rất ngọt (100)</span></div>
                            </div>
                            <div className="space-y-2">
                            <div className="flex justify-between items-center">
                                <label className="font-semibold text-slate-700 flex items-center gap-2">❄️ Độ Lạnh (Trục Y)</label>
                                <span className="font-mono font-bold text-sky-600 w-8 text-right">{userY}</span>
                            </div>
                            <input type="range" min="0" max="100" value={userY} onChange={(e) => setUserY(Number(e.target.value))} className="w-full accent-sky-500"/>
                            <div className="flex justify-between text-xs text-slate-400"><span>Nóng bỏng (0)</span><span>Buốt giá (100)</span></div>
                            </div>
                        </div>
                        <div className="mt-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
                            <p className="text-sm text-slate-600 text-center">Món của bạn đã được AI biến thành Vector:</p>
                            <div className="text-2xl font-mono text-center font-bold text-slate-800 mt-2">V = [{userX}, {userY}]</div>
                        </div>
                        </div>
                        <div className="bg-indigo-50 p-6 rounded-2xl shadow-sm border border-indigo-100">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-indigo-900">
                            <Sparkles className="w-5 h-5 text-indigo-600" /> Kết Quả AI Gợi Ý
                        </h2>
                        {closestItem && (
                            <div className="text-center space-y-3">
                            <div className="text-6xl my-4">{closestItem.icon}</div>
                            <p className="text-slate-700">Khoảng cách ngắn nhất! Món của bạn giống với:</p>
                            <div className="text-2xl font-extrabold text-indigo-700">{closestItem.name}</div>
                            <p className="text-sm font-mono bg-white inline-block px-3 py-1 rounded-full shadow-sm">
                                Vector của {closestItem.name}: [{closestItem.x}, {closestItem.y}]
                            </p>
                            </div>
                        )}
                        </div>
                    </div>

                    {/* Cột phải - Bản đồ */}
                    <div className="md:col-span-7 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                        <h2 className="text-xl font-bold mb-2 flex items-center gap-2">
                            <span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center">2</span>
                            Không Gian Vector (Vector Space)
                        </h2>
                        <p className="text-sm text-slate-500 mb-6">
                            Tất cả các món ăn được "chấm tọa độ" trên bản đồ này. AI tìm món giống nhau bằng cách dùng thước đo xem 2 điểm nào ở gần nhau nhất.
                        </p>
                        <div className="relative w-full flex-grow min-h-[400px] bg-slate-50 border-2 border-slate-200 rounded-xl overflow-hidden mt-2">
                        <div className="absolute inset-0 grid grid-cols-10 grid-rows-10 opacity-20 pointer-events-none">
                            {[...Array(100)].map((_, i) => <div key={i} className="border-r border-b border-slate-400"></div>)}
                        </div>
                        <div className="absolute bottom-2 right-4 text-xs font-bold text-slate-400 opacity-70 flex items-center gap-1">
                            Độ Ngọt <Navigation className="w-3 h-3 rotate-90" />
                        </div>
                        <div className="absolute top-4 left-2 text-xs font-bold text-slate-400 opacity-70 flex items-center gap-1 -rotate-90 origin-left">
                            Độ Lạnh <Navigation className="w-3 h-3 rotate-90" />
                        </div>
                        {closestItem && (
                            <svg className="absolute inset-0 w-full h-full pointer-events-none">
                            <line x1={`${userX}%`} y1={`${100 - userY}%`} x2={`${closestItem.x}%`} y2={`${100 - closestItem.y}%`} stroke="#6366f1" strokeWidth="2" strokeDasharray="6,6" className="animate-pulse"/>
                            </svg>
                        )}
                        {ITEMS.map((item) => (
                            <div key={item.id} className="absolute w-10 h-10 -ml-5 -mb-5 flex flex-col items-center justify-center transition-all duration-300 group z-10" style={{ left: `${item.x}%`, bottom: `${item.y}%` }}>
                            <div className={`text-2xl hover:scale-125 transition-transform cursor-help bg-white/50 backdrop-blur-sm rounded-full w-10 h-10 flex items-center justify-center shadow-sm ${closestItem?.id === item.id ? 'ring-4 ring-indigo-300 ring-offset-2' : ''}`}>
                                {item.icon}
                            </div>
                            <div className="absolute bottom-full mb-1 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap z-20">
                                {item.name} [{item.x}, {item.y}]
                            </div>
                            </div>
                        ))}
                        <div className="absolute w-12 h-12 -ml-6 -mb-6 flex items-center justify-center transition-all duration-100 ease-out z-20" style={{ left: `${userX}%`, bottom: `${userY}%` }}>
                            <div className="relative">
                            <div className="absolute inset-0 bg-indigo-500 rounded-full animate-ping opacity-75"></div>
                            <div className="relative w-8 h-8 bg-indigo-600 rounded-full border-2 border-white shadow-lg flex items-center justify-center text-white text-sm">Bạn</div>
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            );

            const renderConcepts = () => (
                <div className="max-w-5xl mx-auto space-y-8 animate-in">
                    <div className="grid md:grid-cols-3 gap-6">
                        <ConceptVectorBuilder />
                        <ConceptDimensions />
                        <ConceptDistance />
                    </div>
                    <div className="bg-slate-800 text-slate-100 p-8 rounded-2xl shadow-lg relative overflow-hidden">
                        <Sparkles className="absolute top-4 right-4 w-24 h-24 text-slate-700 opacity-50" />
                        <h3 className="text-2xl font-bold mb-4 relative z-10">Tóm lại</h3>
                        <p className="text-lg text-slate-300 relative z-10 max-w-3xl leading-relaxed">
                        Vector hóa (Vectorization) là cây cầu nối giữa <strong className="text-white">Thế giới thực</strong> (ngôn ngữ, hình ảnh, cảm xúc) và <strong className="text-white">Thế giới của Máy tính</strong> (các con số và phép toán). Không có khái niệm này, sẽ không có AI hiện đại ngày nay.
                        </p>
                    </div>
                </div>
            );

            const renderExamples = () => (
                <div className="max-w-5xl mx-auto space-y-6 animate-in">
                    <NLPExample />
                    <VisionExample />
                    <RecSysExample />
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans">
                    <div className="max-w-5xl mx-auto mb-8 text-center space-y-4">
                        <h1 className="text-3xl md:text-5xl font-extrabold text-indigo-700 flex items-center justify-center gap-3">
                        <BrainCircuit className="w-10 h-10" />
                        Giải Mã "Vector Hóa" Trong AI
                        </h1>
                        <p className="text-lg text-slate-600 max-w-3xl mx-auto">
                        Máy tính không hiểu hình ảnh hay ngôn từ, chúng chỉ hiểu <strong>các con số</strong>. 
                        Khám phá cách AI dùng các tọa độ số để hiểu thế giới qua mô phỏng dưới đây!
                        </p>
                    </div>

                    <div className="max-w-5xl mx-auto mb-8">
                        <div className="flex space-x-2 border-b-2 border-slate-200 overflow-x-auto scrollbar-hide pb-[-2px]">
                        <button onClick={() => setActiveTab('simulation')} className={`flex items-center gap-2 px-6 py-4 font-semibold whitespace-nowrap transition-all border-b-2 -mb-[2px] ${activeTab === 'simulation' ? 'border-indigo-600 text-indigo-700 bg-indigo-50/50 rounded-t-lg' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-t-lg'}`}>
                            <Navigation className="w-5 h-5" /> Mô phỏng 2D
                        </button>
                        <button onClick={() => setActiveTab('concept')} className={`flex items-center gap-2 px-6 py-4 font-semibold whitespace-nowrap transition-all border-b-2 -mb-[2px] ${activeTab === 'concept' ? 'border-indigo-600 text-indigo-700 bg-indigo-50/50 rounded-t-lg' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-t-lg'}`}>
                            <BookOpen className="w-5 h-5" /> Khái niệm Cốt lõi
                        </button>
                        <button onClick={() => setActiveTab('examples')} className={`flex items-center gap-2 px-6 py-4 font-semibold whitespace-nowrap transition-all border-b-2 -mb-[2px] ${activeTab === 'examples' ? 'border-indigo-600 text-indigo-700 bg-indigo-50/50 rounded-t-lg' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-t-lg'}`}>
                            <Lightbulb className="w-5 h-5" /> Ví dụ Thực tế
                        </button>
                        </div>
                    </div>

                    <div className="min-h-[500px]">
                        {activeTab === 'simulation' && renderSimulation()}
                        {activeTab === 'concept' && renderConcepts()}
                        {activeTab === 'examples' && renderExamples()}
                    </div>
                </div>
            );
        }

        // Render ứng dụng vào thẻ <div id="root">
        const root = createRoot(document.getElementById('root'));
        root.render(<VectorizationSimulation />);
    </script>
</body>
</html>
